name: Build and deploy ASP.Net Core app to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish ./DotNetCoreSqlDb.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: dotnet install ef
        run: dotnet tool install -g dotnet-ef --version 8.0.*

      - name: dotnet bundle migration
        run: dotnet ef migrations bundle --runtime linux-x64 -p ./DotNetCoreSqlDb.csproj -o ${{env.DOTNET_ROOT}}/myapp/migrate --force

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      # Крок логіну через ваші секрети (Service Principal)
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZUREAPPSERVICE_CLIENTID_5F800DBF1C4A4E5C9CF24D0FEE4C1F52 }}","clientSecret":"${{ secrets.AZUREAPPSERVICE_CLIENTSECRET_ВАШ_ID }}","subscriptionId":"${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_938A26350F5442328669B53681B36357 }}","tenantId":"${{ secrets.AZUREAPPSERVICE_TENANTID_229A0A05FDAC44A381230CF6F0075863 }}"}'

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'msdocs-core-sql-yefimovaa'
          package: ./publish